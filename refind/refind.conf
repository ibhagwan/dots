menuentry "Void Linux" {
    #icon     /EFI/refind/themes/rEFInd-minimal/icons/os_void.png
    icon     /EFI/refind/icons/os_void.png
    volume   "VoidBoot"
    loader   /@/vmlinuz-5.6.18_1
    initrd   /@/initramfs-5.6.18_1.img
    options  "rd.luks.name=1a3f0435-6e24-4365-81b2-881a9d2dd9c2=cryptroot root=/dev/mapper/cryptroot subvol=@ rd.luks.options=discard rw"
    submenuentry "Boot single-user" {
        add_options "single"
    }
    submenuentry "Boot to terminal" {
        add_options "systemd.unit=multi-user.target"
    }
    #disabled
}

menuentry "Void Linux LTS" {
    #icon     /EFI/refind/themes/rEFInd-minimal/icons/os_void.png
    icon     /EFI/refind/icons/os_void.png
    volume   "VoidBoot"
    loader   /@/vmlinuz-5.4.46_1
    initrd   /@/initramfs-5.4.46_1.img
    options  "rd.luks.name=1a3f0435-6e24-4365-81b2-881a9d2dd9c2=cryptroot root=/dev/mapper/cryptroot subvol=@ rd.luks.options=discard rw"
    submenuentry "Boot single-user" {
